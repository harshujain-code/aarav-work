<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivaann's Cricket Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cricket-game.css">
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back Home</a>

    <div class="game-wrapper">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>&#127951; Ivaann's Cricket</h1>
            <p class="subtitle">Hit the ball and score big!</p>
            <div class="difficulty">
                <p>Choose Difficulty:</p>
                <button class="diff-btn active" data-speed="1">Easy</button>
                <button class="diff-btn" data-speed="1.5">Medium</button>
                <button class="diff-btn" data-speed="2">Hard</button>
            </div>
            <button id="start-btn" class="big-btn">Play!</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="scoreboard">
                <div class="score-item">
                    <span class="score-label">Score</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">Balls</span>
                    <span id="balls" class="score-value">30</span>
                </div>
                <div class="score-item">
                    <span class="score-label">Wickets</span>
                    <span id="wickets" class="score-value">0/3</span>
                </div>
            </div>

            <canvas id="cricket-canvas"></canvas>

            <div id="hit-result" class="hit-result"></div>

            <div class="controls">
                <p class="hint">Click or tap when the ball is in the green zone to hit!</p>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="end-screen" class="screen">
            <h2 id="end-title">Game Over!</h2>
            <div class="final-score">
                <span class="final-label">Final Score</span>
                <span id="final-score" class="final-value">0</span>
            </div>
            <div id="end-message" class="end-message"></div>
            <button id="replay-btn" class="big-btn">Play Again!</button>
        </div>
    </div>

    <script src="cricket-game.js"></script>
</body>
</html>
